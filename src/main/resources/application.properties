# =============================================
# Spring Boot
# =============================================
spring.application.name=users-management
server.port=8080

# DataSource y JavaMail se configuran manualmente con @Configuration
# Se excluye la auto-configuracion para evitar conflicto con las claves db.* y smtp.*
spring.autoconfigure.exclude[0]=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.autoconfigure.exclude[1]=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# =============================================
# Configuracion de Base de Datos MySQL
# =============================================
db.host=domain-name-or-ip-db-server
db.port=3306
db.name=db-name
db.username=user-name
db.password=the-password

# =============================================
# Configuracion SMTP (JavaMail)
# =============================================
smtp.host=smtp.gmail.com
smtp.port=587
smtp.username=tu_correo@gmail.com
smtp.password=tu_app_password_aqui
smtp.from.address=tu_correo@gmail.com
smtp.from.name=Gestion de Usuarios
